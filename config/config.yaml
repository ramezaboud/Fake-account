# Fake Account Detection - Configuration
# ========================================

# Data paths
data:
  raw_dir: "data/"
  labeled_dataset: "data/labeled_dataset.csv"
  
# Model configuration
model:
  type: "RandomForestClassifier"
  random_state: 42
  class_weight: "balanced"
  
  # Hyperparameter search space
  param_grid:
    n_estimators: [200, 300, 500]
    max_depth: [10, 20, 30]
    min_samples_split: [2, 5]
    min_samples_leaf: [1, 2]
    max_features: ["sqrt", "log2"]

# Training configuration
training:
  test_size: 0.25
  cv_folds: 5
  scoring: "accuracy"
  n_jobs: -1
  verbose: 2

# Feature engineering
features:
  numeric_cols:
    - statuses_count
    - followers_count
    - friends_count
    - favourites_count
    - listed_count
    
  engineered_features:
    - sex_code
    - lang_code
    - tweets_per_day
    - account_age_days
    - description_length
    - default_profile
    - verified

# Output paths
output:
  models_dir: "models/"
  pipeline_name: "randomforest_pipeline.joblib"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
